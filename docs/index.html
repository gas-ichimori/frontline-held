<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="迎撃戦">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/images/edf_icon.png">
  <title>防衛前線 迎撃戦</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; image-rendering: pixelated; }

    /* ── スマホ全画面タップ画面 ── */
    #fsOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 900;
      background: #000;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      font-family: sans-serif;
    }
    #fsOverlay .fs-bg {
      position: absolute; inset: 0;
      background-image: url('assets/images/ui/top_bg.png');
      background-size: cover;
      background-position: center top;
      filter: brightness(0.45);
    }
    #fsOverlay .fs-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      width: 100%; height: 100%;
      justify-content: space-evenly;
      padding-bottom: 28px;
    }

    /* ── ロゴスライドショー（ヘッダー） ── */
    #fsOverlay .fs-logo-wrap {
      position: relative;
      width: 100%;
      height: 130px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #fsOverlay .fs-logo-wrap img {
      position: absolute;
      height: 100px;
      width: auto;
      max-width: 88%;
      object-fit: contain;
      opacity: 0;
      animation: logo-cycle 9s infinite;
    }
    #fsOverlay .fs-logo-wrap img:nth-child(1) { animation-delay: 0s; }
    #fsOverlay .fs-logo-wrap img:nth-child(2) { animation-delay: 3s; }
    #fsOverlay .fs-logo-wrap img:nth-child(3) { animation-delay: 6s; }
    @keyframes logo-cycle {
      0%    { opacity: 0; }
      6%    { opacity: 1; }
      27%   { opacity: 1; }
      33%   { opacity: 0; }
      100%  { opacity: 0; }
    }

    /* ── ゲームタイトル ── */
    #fsOverlay .fs-game-title {
      text-align: center;
      line-height: 1.15;
    }
    #fsOverlay .fs-game-title .title-ja {
      font-size: 34px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 14px #ff6600, 0 0 28px #ff3300, 0 2px 0 #882200;
      letter-spacing: 5px;
    }
    #fsOverlay .fs-game-title .title-en {
      font-size: 12px;
      font-weight: bold;
      color: #ffaa55;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* ── 点滅テキスト ── */
    .fs-blink {
      font-size: 15px;
      font-weight: bold;
      color: #ff2222;
      text-shadow: 0 0 8px #ff0000;
      letter-spacing: 2px;
      animation: fs-blink 0.75s step-start infinite;
    }
    @keyframes fs-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* ── EDF アイコン ボタン ── */
    #fsOverlay .fs-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #fsOverlay .fs-icon-btn img {
      width: 168px; height: 131px;
      filter: drop-shadow(0 0 16px rgba(255,150,0,0.7));
      animation: icon-pulse 1.2s ease-in-out infinite;
    }
    @keyframes icon-pulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(255,150,0,0.5)); transform: scale(1); }
      50%     { filter: drop-shadow(0 0 30px rgba(255,210,0,1.0)); transform: scale(1.06); }
    }

    /* ── チュートリアル ── */
    #tutorialOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 910;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
    }
    #tutorialOverlay img.tut-img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      flex: 1;
      min-height: 0;
    }
    #tutorialOverlay .tut-start {
      width: 100%;
      text-align: center;
      padding: 14px 0 20px;
      background: rgba(0,0,0,0.75);
      font-family: sans-serif;
      font-size: 18px;
      font-weight: bold;
      color: #44ff44;
      letter-spacing: 3px;
      animation: fs-blink 0.8s step-start infinite;
      flex-shrink: 0;
    }

    /* ── 横向き警告 ── */
    #rotateOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: #000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      color: #fff;
      text-align: center;
      font-family: sans-serif;
    }
    #rotateOverlay .rotate-icon { font-size: 56px; }
    #rotateOverlay .rotate-msg  { font-size: 16px; color: #ffdd44; }
    #rotateOverlay .rotate-sub  { font-size: 12px; color: #888; }

    /* 横向き時に警告表示（スマホのみ） */
    @media screen and (orientation: landscape) and (max-height: 500px) {
      #rotateOverlay { display: flex !important; }

    }


    /* ── デバッグパネル ── */
    #dbgPanel {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.92);
      flex-direction: column; gap: 10px;
      padding: 14px; overflow-y: auto;
      font-family: monospace; font-size: 13px; color: #fff;
    }
    .dbg-title {
      font-size: 15px; font-weight: bold; color: #ffdd00;
      display: flex; justify-content: space-between; align-items: center;
    }
    .dbg-close {
      background: #333; color: #fff; border: 1px solid #666;
      border-radius: 4px; padding: 2px 10px; cursor: pointer; font-size: 12px;
    }
    .dbg-section { border-top: 1px solid #333; padding-top: 8px; }
    .dbg-label { color: #aaa; margin-bottom: 6px; font-size: 12px; }
    .dbg-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .dbg-btn {
      background: #222; color: #eee; border: 1px solid #555;
      border-radius: 4px; padding: 6px 10px; cursor: pointer;
      font-size: 12px; font-family: monospace;
    }
    .dbg-btn:active { background: #444; }
    .dbg-btn.pause  { background: #1a3a1a; border-color: #44ff44; color: #44ff44; }
    .dbg-btn.ant    { border-color: #ff5533; color: #ff5533; }
    .dbg-btn.spider { border-color: #aa66ff; color: #aa66ff; }
    .dbg-btn.bee    { border-color: #ffcc00; color: #ffcc00; }
    .dbg-btn.spd    { border-color: #44aaff; color: #44aaff; }
    .dbg-btn.atk    { border-color: #ff4444; color: #ff4444; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- BGM: docs/assets/audio/bgm.mp3 を配置してください -->
  <audio id="bgm" loop preload="auto">
    <source src="assets/audio/bgm.mp3" type="audio/mpeg">
    <source src="assets/audio/bgm.ogg" type="audio/ogg">
  </audio>

  <!-- スマホ：タップして全画面スタート -->
  <div id="fsOverlay">
    <div class="fs-bg"></div>
    <div class="fs-content">

      <!-- ロゴヘッダー（3枚ループ） -->
      <div class="fs-logo-wrap">
        <img src="assets/images/ui/logo1.png" alt="EDF 6.1x2">
        <img src="assets/images/ui/logo2.png" alt="EDF 6">
        <img src="assets/images/ui/logo3.png" alt="EDF 5">
      </div>

      <!-- ゲームタイトル -->
      <div class="fs-game-title">
        <div class="title-ja">防衛前線　迎撃戦</div>
        <div class="title-en">Operation Frontline Defense</div>
      </div>

      <!-- ▼ ボタンを押せ ▼ -->
      <div class="fs-blink">▼&nbsp;&nbsp;ボタンを押せ&nbsp;&nbsp;▼</div>

      <!-- EDF アイコン ボタン -->
      <button class="fs-icon-btn" onclick="startMobileGame()">
        <img src="assets/images/edf_icon.png" alt="START">
      </button>

      <!-- ▲ PRESS THE BUTTON ▲ -->
      <div class="fs-blink">▲&nbsp;&nbsp;PRESS THE BUTTON&nbsp;&nbsp;▲</div>

    </div>
  </div>

  <!-- チュートリアル -->
  <div id="tutorialOverlay" onclick="startGame()">
    <img class="tut-img" src="assets/images/ui/tutorial.png" alt="チュートリアル">
    <div class="tut-start">▶︎&nbsp;&nbsp;SKIP&nbsp;&nbsp;◀︎</div>
  </div>

  <!-- 横向き警告 -->
  <div id="rotateOverlay">
    <div class="rotate-icon">📱</div>
    <div class="rotate-msg">端末を縦向きにしてください</div>
    <div class="rotate-sub">PLEASE ROTATE YOUR DEVICE</div>
  </div>

  <!-- デバッグパネル -->
  <div id="dbgPanel">

    <div class="dbg-title">
      🛠 DEBUG MODE
      <button class="dbg-close" onclick="toggleDebug()">✕ 閉じる</button>
    </div>

    <!-- ポーズ -->
    <div class="dbg-section">
      <div class="dbg-label">ゲーム制御</div>
      <div class="dbg-row">
        <button id="dbgPauseBtn" class="dbg-btn pause" onclick="togglePause()">⏸ PAUSE</button>
        <button class="dbg-btn" style="border-color:#ff4444;color:#ff4444;" onclick="dbgGameOver()">💀 即GAME OVER</button>
        <button class="dbg-btn" style="border-color:#44ff88;color:#44ff88;" onclick="dbgVictory()">🏆 10000撃破 ALL CLEAR</button>
        <button class="dbg-btn" style="border-color:#aa44ff;color:#aa44ff;" onclick="dbgLoop()">♾️ STAGE∞ 突入</button>
        <button class="dbg-btn" style="border-color:#ff00ff;color:#ff00ff;" onclick="dbgDwn()">⚠ DWN警告テスト</button>
      </div>
    </div>

    <!-- 環境エフェクト -->
    <div class="dbg-section">
      <div class="dbg-label">環境エフェクト</div>
      <div class="dbg-row">
        <button id="dbgFireWaveBtn" class="dbg-btn" style="border-color:#ff8800;color:#ff8800;" onclick="toggleFireWave()">🔥 炎・波 OFF</button>
      </div>
    </div>

    <!-- 攻撃力 -->
    <div class="dbg-section">
      <div class="dbg-label">攻撃力 (ATK: <span id="dbgAtk">-</span>)</div>
      <div class="dbg-row">
        <button class="dbg-btn atk" onclick="dbgAtk(10)">＋10</button>
        <button class="dbg-btn atk" onclick="dbgAtk(50)">＋50</button>
        <button class="dbg-btn atk" onclick="dbgAtk(-10)">－10</button>
        <button class="dbg-btn atk" onclick="dbgAtk(-50)">－50</button>
      </div>
    </div>

    <!-- 弾速 -->
    <div class="dbg-section">
      <div class="dbg-label">弾速 (SPD: <span id="dbgSpd">-</span>)</div>
      <div class="dbg-row">
        <button class="dbg-btn spd" onclick="dbgSpd(5)">＋5</button>
        <button class="dbg-btn spd" onclick="dbgSpd(20)">＋20</button>
        <button class="dbg-btn spd" onclick="dbgSpd(-5)">－5</button>
        <button class="dbg-btn spd" onclick="dbgSpd(-20)">－20</button>
      </div>
    </div>

    <!-- バースト連射数 -->
    <div class="dbg-section">
      <div class="dbg-label">バースト連射数 (1サイクルで何発)</div>
      <div class="dbg-row">
        <button class="dbg-btn" onclick="dbgBurst(1)">1発</button>
        <button class="dbg-btn" onclick="dbgBurst(2)">2連射</button>
        <button class="dbg-btn" onclick="dbgBurst(3)">3連射</button>
        <button class="dbg-btn" onclick="dbgBurst(5)">5連射</button>
        <button class="dbg-btn" onclick="dbgBurst(10)">10連射</button>
      </div>
    </div>

    <!-- 蟻スポーン -->
    <div class="dbg-section">
      <div class="dbg-label">蟻 スポーン</div>
      <div class="dbg-row">
        <button class="dbg-btn ant" onclick="dbgSpawn('ant_s')">🐜 小</button>
        <button class="dbg-btn ant" onclick="dbgSpawn('ant_m')">🐜 中</button>
        <button class="dbg-btn ant" onclick="dbgSpawn('ant_l')">🐜 大</button>
      </div>
    </div>

    <!-- 蜘蛛スポーン -->
    <div class="dbg-section">
      <div class="dbg-label">蜘蛛 スポーン</div>
      <div class="dbg-row">
        <button class="dbg-btn spider" onclick="dbgSpawn('spider_s')">🕷 小</button>
        <button class="dbg-btn spider" onclick="dbgSpawn('spider_m')">🕷 中</button>
        <button class="dbg-btn spider" onclick="dbgSpawn('spider_l')">🕷 大</button>
      </div>
    </div>

    <!-- 蜂スポーン -->
    <div class="dbg-section">
      <div class="dbg-label">蜂 スポーン</div>
      <div class="dbg-row">
        <button class="dbg-btn bee" onclick="dbgSpawn('bee_s')">🐝 小</button>
        <button class="dbg-btn bee" onclick="dbgSpawn('bee_m')">🐝 中</button>
        <button class="dbg-btn bee" onclick="dbgSpawn('bee_l')">🐝 大</button>
      </div>
    </div>

    <!-- 敵スピード -->
    <div class="dbg-section">
      <div class="dbg-label">敵スピード倍率: <span id="dbgSpdLabel">1x</span> &nbsp;(depthSpd: <span id="dbgSpdVal">0.000100</span>)</div>
      <div class="dbg-row">
        <button class="dbg-btn" onclick="dbgEnemySpd(0.3)">×0.3<br><span style="font-size:10px">0.000030</span></button>
        <button class="dbg-btn" onclick="dbgEnemySpd(0.6)">×0.6<br><span style="font-size:10px">0.000060</span></button>
        <button class="dbg-btn" onclick="dbgEnemySpd(1.0)">×1.0<br><span style="font-size:10px">0.000100</span></button>
        <button class="dbg-btn" onclick="dbgEnemySpd(1.5)">×1.5<br><span style="font-size:10px">0.000150</span></button>
        <button class="dbg-btn" onclick="dbgEnemySpd(2.0)">×2.0<br><span style="font-size:10px">0.000200</span></button>
        <button class="dbg-btn" onclick="dbgEnemySpd(3.0)">×3.0<br><span style="font-size:10px">0.000300</span></button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>

  <!-- ATK/SPD の現在値をリアルタイム表示 -->
  <script>
    setInterval(() => {
      if (typeof pl === 'undefined') return;
      const a = document.getElementById('dbgAtk');
      const s = document.getElementById('dbgSpd');
      if (a) a.textContent = pl.atk;
      if (s) s.textContent = pl.bspd;
    }, 200);
  </script>

  <!-- スマホ：全画面 + 縦向きロック -->
  <script>
    function isMobile() {
      return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    }

    // タイトルタップ → チュートリアル表示
    function startMobileGame() {
      document.getElementById('fsOverlay').style.display = 'none';
      document.getElementById('tutorialOverlay').style.display = 'flex';
    }

    // SKIP タップ → 全画面でゲーム開始
    async function startGame() {
      document.getElementById('tutorialOverlay').style.display = 'none';
      // ゲームのポーズを解除
      if (typeof paused !== 'undefined') paused = false;
      if (typeof resume === 'function') resume();
      // BGM 再生（うっすら）
      const bgm = document.getElementById('bgm');
      if (bgm) { bgm.volume = 0.07; bgm.play().catch(()=>{}); }
      try {
        const el = document.documentElement;
        if (el.requestFullscreen)            await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      } catch(e) {}
      try {
        if (screen.orientation?.lock) await screen.orientation.lock('portrait');
      } catch(e) {}
    }

    // サービスワーカー登録（PWA）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/frontline-held/sw.js').catch(() => {});
    }

    // スマホのみ：タイトル画面表示 + ゲームを一時停止
    if (isMobile()) {
      document.getElementById('fsOverlay').style.display = 'flex';
      if (typeof paused !== 'undefined') paused = true;
    }
  </script>
</body>
</html>
